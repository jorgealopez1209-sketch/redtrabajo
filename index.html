_load(){try{return JSON.parse(localStorage.getItem(DB_KEY)||"{}");}catch{return{};}},

const MapPin=({lat,lng,onSet,readOnly=false,height=210})=>{const ref=useRef(null);const handleClick=e=>{if(readOnly)return;const r=ref.current.getBoundingClientRect();const x=((e.clientX-r.left)/r.width)*100;const y=((e.clientY-r.top)/r.height)*100;onSet(Math.max(2,Math.min(98,x)),Math.max(2,Math.min(98,y)));};return(<div ref={ref} onClick={handleClick} style={{width:"100%",height,background:"linear-gradient(135deg,#0f1f14,#121c18,#0d1419)",border:`1.5px solid ${T.border}`,borderRadius:14,position:"relative",overflow:"hidden",cursor:readOnly?"default":"crosshair"}}><svg style={{position:"absolute",inset:0,width:"100%",height:"100%"}}><defs><pattern id="g1" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M 24 0 L 0 0 0 24" fill="none" stroke="#1e3328" strokeWidth="0.8"/></pattern></defs><rect width="100%" height="100%" fill="url(#g1)"/><line x1="0" y1="28%" x2="100%" y2="24%" stroke="#2a4a38" strokeWidth="2.5" opacity="0.7"/><line x1="0" y1="52%" x2="100%" y2="56%" stroke="#2a4a38" strokeWidth="2.5" opacity="0.7"/><line x1="0" y1="76%" x2="100%" y2="74%" stroke="#2a4a38" strokeWidth="2.5" opacity="0.7"/><line x1="22%" y1="0" x2="25%" y2="100%" stroke="#2a4a38" strokeWidth="2.5" opacity="0.7"/><line x1="50%" y1="0" x2="48%" y2="100%" stroke="#2a4a38" strokeWidth="2.5" opacity="0.7"/><line x1="76%" y1="0" x2="79%" y2="100%" stroke="#2a4a38" strokeWidth="2.5" opacity="0.7"/><ellipse cx="28%" cy="38%" rx="45" ry="28" fill="#1e3d2a" opacity="0.6"/><ellipse cx="72%" cy="65%" rx="38" ry="22" fill="#1e3d2a" opacity="0.6"/></svg><div style={{position:"absolute",top:8,left:10,color:T.sub,fontSize:10,fontWeight:700,letterSpacing:0.6,background:"#000a",padding:"3px 8px",borderRadius:6}}>🗺️ REDTRABAJO MAP</div>{!readOnly&&lat===null&&(<div style={{position:"absolute",top:"50%",left:0,right:0,textAlign:"center",color:T.sub,fontSize:13,fontWeight:600,pointerEvents:"none",transform:"translateY(-50%)",padding:"0 20px"}}>👆 Tap the map to drop your location pin</div>)}{lat!==null&&lng!==null&&(<div style={{position:"absolute",left:`${lng}%`,top:`${lat}%`,transform:"translate(-50%,-100%)",pointerEvents:"none",animation:"bounce 0.4s ease-out"}}><div style={{fontSize:30,filter:"drop-shadow(0 3px 8px rgba(0,0,0,0.7))"}}>📍</div></div>)}{lat!==null&&!readOnly&&(<div style={{position:"absolute",bottom:8,left:10,right:10,background:T.accent+"22",border:`1px solid ${T.accent}44`,borderRadius:8,padding:"5px 10px",color:T.accent,fontSize:11,fontWeight:700,textAlign:"center"}}>✓ Pin placed — tap to move it</div>)}</div>);};
const MapWithWorkers=({workers,onPick,pickedId,customerLat,customerLng})=>(<div style={{width:"100%",height:220,background:"linear-gradient(135deg,#0f1f14,#121c18,#0d1419)",border:`1.5px solid ${T.border}`,borderRadius:14,position:"relative",overflow:"hidden"}}><svg style={{position:"absolute",inset:0,width:"100%",height:"100%"}}><defs><pattern id="g2" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M 24 0 L 0 0 0 24" fill="none" stroke="#1e3328" strokeWidth="0.8"/></pattern></defs><rect width="100%" height="100%" fill="url(#g2)"/><line x1="0" y1="28%" x2="100%" y2="24%" stroke="#2a4a38" strokeWidth="2.5" opacity="0.7"/><line x1="0" y1="52%" x2="100%" y2="56%" stroke="#2a4a38" strokeWidth="2.5" opacity="0.7"/><line x1="22%" y1="0" x2="25%" y2="100%" stroke="#2a4a38" strokeWidth="2.5" opacity="0.7"/><line x1="50%" y1="0" x2="48%" y2="100%" stroke="#2a4a38" strokeWidth="2.5" opacity="0.7"/><ellipse cx="28%" cy="38%" rx="45" ry="28" fill="#1e3d2a" opacity="0.6"/><ellipse cx="72%" cy="65%" rx="38" ry="22" fill="#1e3d2a" opacity="0.6"/></svg><div style={{position:"absolute",top:8,left:10,color:T.sub,fontSize:10,fontWeight:700,background:"#000a",padding:"3px 8px",borderRadius:6}}>🗺️ NEARBY WORKERS</div>{customerLat!=null&&(<div style={{position:"absolute",left:`${customerLng}%`,top:`${customerLat}%`,transform:"translate(-50%,-100%)",zIndex:3,pointerEvents:"none"}}><div style={{fontSize:26,filter:"drop-shadow(0 3px 8px rgba(0,0,0,0.7))"}}>🏠</div></div>)}{workers.map(w=>(<div key={w.id} onClick={e=>{e.stopPropagation();onPick&&onPick(w);}} style={{position:"absolute",left:`${w.lng||50}%`,top:`${w.lat||50}%`,transform:"translate(-50%,-100%)",cursor:"pointer",zIndex:pickedId===w.id?5:2}} title={w.name}><div style={{fontSize:pickedId===w.id?32:24,filter:"drop-shadow(0 3px 8px rgba(0,0,0,0.7))"}}>{pickedId===w.id?"🔵":"📍"}</div></div>))}</div>);
function Landing({onRole}){return(<div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}><div style={{width:"100%",maxWidth:400}}><div style={{textAlign:"center",marginBottom:48}}><Logo size={34}/><p style={{color:T.sub,fontSize:14,marginTop:10,lineHeight:1.6}}>Bolivia's fastest service-matching platform</p></div><div style={{display:"flex",flexDirection:"column",gap:12}}><Card onClick={()=>onRole("worker")} style={{padding:"20px 18px"}}><div style={{display:"flex",alignItems:"center",gap:14}}><div style={{fontSize:40,flexShrink:0}}>👷</div><div><div style={{fontWeight:800,fontSize:17}}>I'm a Worker</div><div style={{color:T.sub,fontSize:13,marginTop:3}}>Offer services and get hired</div></div><div style={{marginLeft:"auto",color:T.faint,fontSize:22}}>›</div></div></Card><Card onClick={()=>onRole("customer")} style={{padding:"20px 18px"}}><div style={{display:"flex",alignItems:"center",gap:14}}><div style={{fontSize:40,flexShrink:0}}>🧑</div><div><div style={{fontWeight:800,fontSize:17}}>I'm a Customer</div><div style={{color:T.sub,fontSize:13,marginTop:3}}>Find nearby workers for any job</div></div><div style={{marginLeft:"auto",color:T.faint,fontSize:22}}>›</div></div></Card><Divider label="ADMIN"/><Btn variant="ghost" full onClick={()=>onRole("admin-login")}>🔐 Admin Login</Btn></div></div></div>);}
function WorkerAuth({onDone,onBack}){const [tab,setTab]=useState("login");const [form,setForm]=useState({ci:"",name:"",skill:"",exp:"",city:"",phone:"",lat:null,lng:null});const [err,setErr]=useState({});const [loading,setLoading]=useState(false);const [ok,setOk]=useState(false);const set=(k,v)=>setForm(p=>({...p,[k]:v}));const submit=()=>{const e={};if(!form.ci||form.ci.length<5)e.ci="CI must be at least 5 digits";if(!form.name.trim())e.name="Name is required";if(tab==="signup"){if(!form.skill.trim())e.skill="Skill is required";if(!form.city.trim())e.city="City is required";if(form.lat===null)e.map="Please pin your location on the map";}setErr(e);if(Object.keys(e).length>0)return;setLoading(true);setTimeout(()=>{if(tab==="signup"){const ex=db.getWhere("workers","ci",form.ci);if(ex.length>0){setErr({ci:"CI already registered. Please log in."});setLoading(false);return;}const w=db.addDoc("workers",{...form,available:true,role:"worker"});setLoading(false);setOk(true);setTimeout(()=>onDone(w),1200);}else{const m=db.getWhere("workers","ci",form.ci).filter(w=>w.name.toLowerCase()===form.name.toLowerCase());if(m.length===0){setErr({ci:"No account found with this name and CI."});setLoading(false);return;}setLoading(false);onDone(m[0]);}},500);};if(ok)return(<div style={{paddingTop:10,textAlign:"center"}}><div style={{fontSize:56,marginBottom:12}}>✅</div><h2 style={{color:T.green,fontSize:22,fontWeight:800}}>Account Created!</h2><p style={{color:T.sub,fontSize:13,marginTop:6}}>Redirecting...</p></div>);return(<div style={{paddingTop:4}}><Back onClick={onBack}/><div style={{textAlign:"center",marginBottom:24}}><Logo size={22}/><h2 style={{fontSize:20,fontWeight:800,marginTop:12}}>{tab==="signup"?"Create Worker Account":"Worker Login"}</h2><p style={{color:T.sub,fontSize:13,marginTop:4}}>{tab==="signup"?"Register once, log in anytime with Name + CI":"Enter your Name and CI to access your account"}</p></div><div style={{display:"flex",gap:4,background:T.surface,borderRadius:12,padding:4,marginBottom:22}}>{[["login","🔑 Log In"],["signup","✨ Sign Up"]].map(([t,label])=>(<button key={t} onClick={()=>{setTab(t);setErr({});}} style={{flex:1,background:tab===t?T.card:"transparent",border:tab===t?`1px solid ${T.border}`:"1px solid transparent",borderRadius:10,padding:"10px 0",color:tab===t?T.text:T.sub,fontWeight:700,fontSize:13,cursor:"pointer"}}>{label}</button>))}</div><div style={{display:"flex",flexDirection:"column",gap:14}}><Input label="National ID (CI) *" placeholder="e.g. 7823401" value={form.ci} onChange={e=>set("ci",e.target.value.replace(/\D/g,""))} icon="🪪" error={err.ci} hint="Minimum 5 digits"/><Input label="Full Name *" placeholder="e.g. Carlos Mamani" value={form.name} onChange={e=>set("name",e.target.value)} icon="👤" error={err.name}/>{tab==="signup"&&<><Input label="Skill / Service *" placeholder="e.g. Electrician, Gardener" value={form.skill} onChange={e=>set("skill",e.target.value)} icon="🔧" error={err.skill}/><Input label="Years of Experience" placeholder="e.g. 3 years" value={form.exp} onChange={e=>set("exp",e.target.value)} icon="📅"/><Input label="City *" placeholder="e.g. La Paz" value={form.city} onChange={e=>set("city",e.target.value)} icon="🏙️" error={err.city}/><Input label="Phone / WhatsApp" placeholder="e.g. 71234567" value={form.phone} onChange={e=>set("phone",e.target.value)} icon="📱"/><div><label style={{fontSize:11,fontWeight:700,color:T.sub,letterSpacing:0.6,textTransform:"uppercase",display:"block",marginBottom:6}}>📍 Pin Your Location *</label><MapPin lat={form.lat} lng={form.lng} onSet={(lng,lat)=>setForm(p=>({...p,lat,lng}))}/>{err.map&&<p style={{color:T.red,fontSize:12,marginTop:4}}>{err.map}</p>}</div></>}<Btn full onClick={submit} loading={loading}>{tab==="signup"?"Create Account 🚀":"Log In →"}</Btn><p style={{textAlign:"center",color:T.sub,fontSize:12}}>{tab==="signup"?"Already have an account? ":"New here? "}<span onClick={()=>{setTab(tab==="signup"?"login":"signup");setErr({});}} style={{color:T.ac function CustomerAuth({onDone,onBack}){const [tab,setTab]=useState("login");const [form,setForm]=useState({name:"",city:"",phone:"",lat:null,lng:null});const [err,setErr]=useState({});const [loading,setLoading]=useState(false);const set=(k,v)=>setForm(p=>({...p,[k]:v}));const submit=()=>{const e={};if(!form.name.trim())e.name="Name is required";if(tab==="signup"&&form.lat===null)e.map="Please pin your home location";setErr(e);if(Object.keys(e).length>0)return;setLoading(true);setTimeout(()=>{if(tab==="signup"){const ex=db.getWhere("customers","nameLower",form.name.toLowerCase());if(ex.length>0){setErr({name:"Name taken. Try logging in."});setLoading(false);return;}const c=db.addDoc("customers",{...form,nameLower:form.name.toLowerCase(),role:"customer"});setLoading(false);onDone(c);}else{const m=db.getWhere("customers","nameLower",form.name.toLowerCase());if(m.length===0){setErr({name:"No account found. Please sign up first."});setLoading(false);return;}setLoading(false);onDone(m[0]);}},400);};return(<div style={{paddingTop:4}}><Back onClick={onBack}/><div style={{textAlign:"center",marginBottom:24}}><Logo size={22}/><h2 style={{fontSize:20,fontWeight:800,marginTop:12}}>{tab==="signup"?"Create Customer Account":"Customer Login"}</h2><p style={{color:T.sub,fontSize:13,marginTop:4}}>{tab==="signup"?"Register to find workers near you":"Enter your name to access your account"}</p></div><div style={{display:"flex",gap:4,background:T.surface,borderRadius:12,padding:4,marginBottom:22}}>{[["login","🔑 Log In"],["signup","✨ Sign Up"]].map(([t,label])=>(<button key={t} onClick={()=>{setTab(t);setErr({});}} style={{flex:1,background:tab===t?T.card:"transparent",border:tab===t?`1px solid ${T.border}`:"1px solid transparent",borderRadius:10,padding:"10px 0",color:tab===t?T.text:T.sub,fontWeight:700,fontSize:13,cursor:"pointer"}}>{label}</button>))}</div><div style={{display:"flex",flexDirection:"column",gap:14}}><Input label="Full Name *" placeholder="e.g. Luis Torres" value={form.name} onChange={e=>set("name",e.target.value)} icon="👤" error={err.name}/>{tab==="signup"&&<><Input label="City" placeholder="e.g. La Paz" value={form.city} onChange={e=>set("city",e.target.value)} icon="🏙️"/><Input label="Phone" placeholder="e.g. 70111222" value={form.phone} onChange={e=>set("phone",e.target.value)} icon="📱"/><div><label style={{fontSize:11,fontWeight:700,color:T.sub,letterSpacing:0.6,textTransform:"uppercase",display:"block",marginBottom:6}}>🏠 Pin Your Home Location *</label><MapPin lat={form.lat} lng={form.lng} onSet={(lng,lat)=>setForm(p=>({...p,lat,lng}))}/>{err.map&&<p style={{color:T.red,fontSize:12,marginTop:4}}>{err.map}</p>}</div></>}<Btn full onClick={submit} loading={loading}>{tab==="signup"?"Create Account →":"Log In →"}</Btn><p style={{textAlign:"center",color:T.sub,fontSize:12}}>{tab==="signup"?"Already have an account? ":"New here? "}<span onClick={()=>{setTab(tab==="signup"?"login":"signup");setErr({});}} style={{color:T.accent,cursor:"pointer",fontWeight:700}}>{tab==="signup"?"Log in":"Sign up"}</span></p></div></div>);}
function WorkerInbox({worker,onOpenChat,onToggle,onBack}){const [chats,setChats]=useState([]);const [customers,setCustomers]=useState([]);useEffect(()=>{setChats(db.getWhere("chats","workerId",worker.id));setCustomers(db.getDocs("customers"));},[worker.id]);const avail=worker.available!==false;return(<div style={{paddingBottom:60}}><Back onClick={onBack} label="Sign Out"/><Card style={{marginBottom:20,borderColor:avail?T.green+"44":T.faint+"44"}}><div style={{display:"flex",gap:14,alignItems:"center"}}><Avatar name={worker.name} size={52}/><div style={{flex:1}}><div style={{fontWeight:800,fontSize:17}}>{worker.name}</div><div style={{color:T.accent,fontSize:13,fontWeight:600,marginTop:2}}>{worker.skill}</div><div style={{color:T.sub,fontSize:12,marginTop:1}}>📍 {worker.city} · CI: {worker.ci}</div><div style={{marginTop:8}}><Badge color={avail?T.green:T.red}><StatusDot active={avail}/>{avail?"Available to Contact":"Paused"}</Badge></div></div><Btn small variant={avail?"ghost":"green"} onClick={onToggle}>{avail?"Pause":"Go Live"}</Btn></div></Card><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><h3 style={{fontWeight:800,fontSize:18}}>📬 Inbox</h3><Badge color={T.blue}>{chats.length} chat{chats.length!==1?"s":""}</Badge></div>{chats.length===0?(<Card style={{textAlign:"center",padding:"36px 16px"}}><div style={{fontSize:40,marginBottom:10}}>📭</div><div style={{fontWeight:700}}>No messages yet</div><div style={{color:T.sub,fontSize:13,marginTop:6}}>Customers will appear here when they contact you</div></Card>):(<div style={{display:"flex",flexDirection:"column",gap:10}}>{chats.map(ch=>{const c=customers.find(x=>x.id===ch.customerId);const last=ch.messages?.[ch.messages.length-1];return(<Card key={ch.id} onClick={()=>onOpenChat(ch)}><div style={{display:"flex",gap:12,alignItems:"center"}}><Avatar name={c?.name||"?"} size={44}/><div style={{flex:1,minWidth:0}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontWeight:700,fontSize:14}}>{c?.name||"Customer"}</div><div style={{color:T.faint,fontSize:11}}>{last?.time||""}</div></div><div style={{color:T.sub,fontSize:12,marginTop:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{last?(last.from==="worker"?"You: ":"")+last.text:"Tap to chat"}</div></div><span style={{color:T.faint,fontSize:20}}>›</span></div></Card>);})}</div>)}</div>);}
function CustomerSearch({customer,onPickWorker,onGoInbox,chatCount,onBack}){const [q,setQ]=useState("");const [workers,setWorkers]=useState([]);const [picked,setPicked]=useState(null);useEffect(()=>{setWorkers(db.getDocs("workers"));},[]);const filtered=workers.filter(w=>w.available!==false&&[w.skill,w.name,w.city].some(v=>v?.toLowerCase().includes(q.toLowerCase())));return(<div style={{paddingBottom:70}}><Back onClick={onBack} label="Sign Out"/><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}><div><h2 style={{fontWeight:800,fontSize:20}}>Hi {customer.name.split(" ")[0]} 👋</h2><p style={{color:T.sub,fontSize:13,marginTop:3}}>What service do you need?</p></div><Btn small variant="outline" onClick={onGoInbox}>💬{chatCount>0?` (${chatCount})`:""} Inbox</Btn></div><div style={{marginBottom:14}}><Input placeholder="Search: electrician, gardener..." value={q} onChange={e=>setQ(e.target.value)} icon="🔍"/></div><div style={{marginBottom:14}}><MapWithWorkers workers={filtered} onPick={setPicked} pickedId={picked?.id} customerLat={customer.lat} customerLng={customer.lng}/></div>{picked&&(<Card style={{marginBottom:14,borderColor:T.accent+"55"}}><div style={{display:"flex",gap:12,alignItems:"center"}}><Avatar name={picked.name}/><div style={{flex:1}}><div style={{fontWeight:800,fontSize:15}}>{picked.name}</div><div style={{color:T.accent,fontSize:12,fontWeight:600}}>{picked.skill} · {picked.exp}</div><div style={{color:T.sub,fontSize:11,marginTop:1}}>📍 {picked.city}</div></div><Btn small variant="green" onClick={()=>onPickWorker(picked)}>💬 Contact</Btn></div></Card>)}<div style={{color:T.sub,fontSize:11,fontWeight:700,letterSpacing:0.6,textTransform:"uppercase",marginBottom:10}}>{filtered.length} worker{filtered.length!==1?"s":""} available</div><div style={{display:"flex",flexDirection:"column",gap:10}}>{filtered.map(w=>(<Card key={w.id} onClick={()=>setPicked(w)} style={picked?.id===w.id?{borderColor:T.accent}:{}}><div style={{display:"flex",gap:12,alignItems:"center"}}><Avatar name={w.name}/><div style={{flex:1}}><div style={{fontWeight:700,fontSize:14}}>{w.name}</div><div style={{color:T.accent,fontSize:12}}>{w.skill}</div><div style={{color:T.sub,fontSize:11}}>📍 {w.city} · {w.exp}</div></div><div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}><Badge color={T.green}><StatusDot active/>Available</Badge><Btn small variant="outline" onClick={e=>{e.stopPropagation();onPickWorker(w);}}>Contact</Btn></div></div></Card>))}{!filtered.length&&(<Card style={{textAlign:"center",padding:"32px 16px"}}><div style={{fontSize:36,marginBottom:8}}>🔍</div><div style={{color:T.sub,fontSize:13}}>No workers found for "{q}"</div></Card>)}</div></div>);}
function CustomerInbox({customer,onOpenChat,onBack}){const [chats,setChats]=useState([]);const [workers,setWorkers]=useState([]);useEffect(()=>{setChats(db.getWhere("chats","customerId",customer.id));setWorkers(db.getDocs("workers"));},[customer.id]);return(<div><Back onClick={onBack} label="Back to Search"/><h3 style={{fontWeight:800,fontSize:20,marginBottom:16}}>💬 Your Conversations</h3>{chats.length===0?(<Card style={{textAlign:"center",padding:"32px 16px"}}><div style={{fontSize:36,marginBottom:8}}>📭</div><div style={{color:T.sub,fontSize:13}}>No conversations yet</div></Card>):(<div style={{display:"flex",flexDirection:"column",gap:10}}>{chats.map(ch=>{const w=workers.find(x=>x.id===ch.workerId);const last=ch.messages?.[ch.messages.length-1];return(<Card key={ch.id} onClick={()=>onOpenChat(ch)}><div style={{display:"flex",gap:12,alignItems:"center"}}><Avatar name={w?.name||"?"}/><div style={{flex:1,minWidth:0}}><div style={{display:"flex",justifyContent:"space-between"}}><div style={{fontWeight:700,fontSize:14}}>{w?.name}</div><div style={{color:T.faint,fontSize:11}}>{last?.time}</div></div><div style={{color:T.accent,fontSize:11,marginTop:2}}>{w?.skill}</div><div style={{color:T.sub,fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginTop:2}}>{last?(last.from==="customer"?"You: ":"")+last.text:"Tap to chat"}</div></div><span style={{color:T.faint,fontSize:20}}>›</span></div></Card>);})}</div>)}</div>);}
function ChatScreen({chatId,currentRole,otherName,otherSub,onBack}){const [messages,setMessages]=useState([]);const [text,setText]=useState("");const scrollRef=useRef(null);useEffect(()=>{const c=db.getDocs("chats").find(c=>c.id===chatId);setMessages(c?.messages||[]);},[chatId]);useEffect(()=>{scrollRef.current?.scrollTo(0,scrollRef.current.scrollHeight);},[messages]);const send=()=>{if(!text.trim())return;const time=new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});const msg={from:currentRole,text:text.trim(),time};const c=db.getDocs("chats").find(c=>c.id===chatId);const updated=[...(c?.messages||[]),msg];db.updateDoc("chats",chatId,{messages:updated});setMessages(updated);setText("");};return(<div style={{display:"flex",flexDirection:"column",height:"100vh",background:T.bg}}><div style={{background:T.surface,borderBottom:`1px solid ${T.border}`,padding:"12px 16px",display:"flex",gap:12,alignItems:"center",flexShrink:0}}><button onClick={onBack} style={{background:"none",border:"none",color:T.text,fontSize:22,cursor:"pointer",padding:0,lineHeight:1}}>‹</button><Avatar name={otherName||"?"} size={38}/><div style={{flex:1}}><div style={{fontWeight:700,fontSize:15}}>{otherName}</div><div style={{color:T.sub,fontSize:11,marginTop:1}}>{otherSub}</div></div><Badge color={T.green}><StatusDot active/>Online</Badge></div><div ref={scrollRef} style={{flex:1,overflow:"auto",padding:"16px 14px",display:"flex",flexDirection:"column",gap:8}}>{messages.length===0&&(<div style={{textAlign:"center",color:T.sub,padding:40,fontSize:13}}><div style={{fontSize:36,marginBottom:8}}>👋</div>Say hi to {otherName}!</div>)}{messages.map((m,i)=>{const mine=m.from===currentRole;return(<div key={i} style={{alignSelf:mine?"flex-end":"flex-start",maxWidth:"80%"}}><div style={{background:mine?`linear-gradient(135deg,${T.accent},${T.accentDark})`:T.card,color:mine?"#0A0B0F":T.text,borderRadius:18,borderBottomRightRadius:mine?4:18,borderBottomLeftRadius:mine?18:4,padding:"9px 14px",fontSize:14,lineHeight:1.5,border:mine?"none":`1px solid ${T.border}`}}>{m.text}</div><div style={{color:T.faint,fontSize:10,textAlign:mine?"right":"left",marginTop:3,padding:"0 4px"}}>{m.time}</div></div>);})}</div><div style={{borderTop:`1px solid ${T.border}`,padding:"10px 12px",display:"flex",gap:8,background:T.surface,flexShrink:0}}><input value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Type a message..." style={{flex:1,background:"#0D0F18",border:`1.5px solid ${T.border}`,borderRadius:24,color:T.text,padding:"11px 18px",fontSize:14,outline:"none"}} onFocus={e=>e.target.style.borderColor=T.accent} onBlur={e=>e.target.style.borderColor=T.border}/><button onClick={send} disabled={!text.trim()} style={{background:text.trim()?`linear-gradient(135deg,${T.accent},${T.accentDark})`:"#1a1d26",border:"none",borderRadius:"50%",width:46,height:46,color:text.trim()?"#0A0B0F":T.faint,fontSize:18,cursor:text.trim()?"pointer":"default",flexShrink:0}}>➤</button></div></div>);}
function AdminLogin({onSuccess,onBack}){const [pw,setPw]=useState("");const [err,setErr]=useState("");const go=()=>pw===T.ADMIN_PW?onSuccess():(setErr("Wrong password."),setPw(""));return(<div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}><div style={{width:"100%",maxWidth:360}}><Back onClick={onBack}/><div style={{textAlign:"center",marginBottom:32}}><div style={{fontSize:48,marginBottom:10}}>🔐</div><h2 style={{fontWeight:800,fontSize:24}}>Admin Access</h2><p style={{color:T.sub,fontSize:13,marginTop:6}}>Authorized personnel only</p></div><div style={{display:"flex",flexDirection:"column",gap:14}}><Input label="Admin Password" placeholder="Enter password" type="password" value={pw} onChange={e=>{setPw(e.target.value);setErr("");}} icon="🔑" error={err}/><Btn full onClick={go} disabled={!pw}>Enter Admin Panel</Btn></div></div></div>);}
function AdminDashboard({onLogout}){const [tab,setTab]=useState("workers");const [q,setQ]=useState("");const [workers,setWorkers]=useState([]);const [customers,setCustomers]=useState([]);const [chats,setChats]=useState([]);const refresh=()=>{setWorkers(db.getDocs("workers"));setCustomers(db.getDocs("customers"));setChats(db.getDocs("chats"));};useEffect(()=>{refresh();},[]);const fw=workers.filter(w=>[w.name,w.ci,w.skill,w.city].some(v=>v?.toLowerCase().includes(q.toLowerCase())));const fc=customers.filter(c=>[c.name,c.city].some(v=>v?.toLowerCase().includes(q.toLowerCase())));const handleReset=()=>{if(!window.confirm("Reset ALL data?"))return;db.reset();refresh();};return(<div style={{minHeight:"100vh",background:T.bg}}><div style={{background:T.surface,borderBottom:`1px solid ${T.border}`,padding:"13px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:10}}><div style={{display:"flex",alignItems:"center",gap:10}}><Logo size={17}/><Badge color={T.red}>ADMIN</Badge></div><div style={{display:"flex",gap:6}}><Btn small variant="danger" onClick={handleReset}>Reset</Btn><Btn small variant="ghost" onClick={onLogout}>Logout</Btn></div></div><div style={{maxWidth:480,margin:"0 auto",padding:"20px 20px 60px"}}><div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:20}}>{[{l:"Workers",v:workers.length,c:T.accent},{l:"Customers",v:customers.length,c:T.blue},{l:"Chats",v:chats.length,c:T.purple}].map(s=>(<Card key={s.l} style={{textAlign:"center",padding:"14px 8px"}}><div style={{fontSize:26,fontWeight:900,color:s.c}}>{s.v}</div><div style={{color:T.sub,fontSize:11,marginTop:2}}>{s.l}</div></Card>))}</div><div style={{marginBottom:14}}><Input placeholder="Search by name, CI, skill..." value={q} onChange={e=>setQ(e.target.value)} icon="🔍"/></div><div style={{display:"flex",gap:4,background:T.surface,borderRadius:12,padding:4,marginBottom:16}}>{[["workers","👷 Workers"],["customers","🧑 Customers"],["chats","💬 Chats"]].map(([t,label])=>(<button key={t} onClick={()=>setTab(t)} style={{flex:1,background:tab===t?T.card:"transparent",border:tab===t?`1px solid ${T.border}`:"1px solid transparent",borderRadius:8,padding:"9px 4px",color:tab===t?T.text:T.sub,fontWeight:700,fontSize:11,cursor:"pointer"}}>{label}</button>))}</div>{tab==="workers"&&(<div style={{display:"flex",flexDirection:"column",gap:10}}>{fw.map(w=>(<Card key={w.id}><div style={{display:"flex",gap:12,alignItems:"center"}}><Avatar name={w.name}/><div style={{flex:1}}><div style={{fontWeight:700,fontSize:14}}>{w.name}</div><div style={{color:T.accent,fontSize:12,fontWeight:600}}>{w.skill} · {w.exp}</div><div style={{color:T.sub,fontSize:11,marginTop:1}}>CI: {w.ci} · 📍 {w.city} · 📱 {w.phone}</div><div style={{marginTop:6,display:"flex",gap:6,flexWrap:"wrap"}}><Badge color={w.available!==false?T.green:T.red}>{w.available!==false?"Available":"Paused"}</Badge><Badge color={T.faint}>Saved ✓</Badge></div></div></div></Card>))}{!fw.length&&<div style={{textAlign:"center",color:T.sub,padding:"30px 0"}}>No workers found</div>}</div>)}{tab==="customers"&&(<div style={{display:"flex",flexDirection:"column",gap:10}}>{fc.map(c=>(<Card key={c.id}><div style={{display:"flex",gap:12,alignItems:"center"}}><Avatar name={c.name}/><div><div style={{fontWeight:700,fontSize:14}}>{c.name}</div><div style={{color:T.sub,fontSize:12,marginTop:1}}>📍 {c.city||"—"} · 📱 {c.phone||"—"}</div><div style={{marginTop:6}}><Badge color={T.faint}>Saved ✓</Badge></div></div></div></Card>))}{!fc.length&&<div style={{textAlign:"center",color:T.sub,padding:"30px 0"}}>No customers yet</div>}</div>)}{tab==="chats"&&(<div style={{display:"flex",flexDirection:"column",gap:10}}>{chats.map(ch=>{const w=workers.find(x=>x.id===ch.workerId);const c=customers.find(x=>x.id===ch.customerId);const last=ch.messages?.[ch.messages.length-1];return(<Card key={ch.id}><div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8,flexWrap:"wrap"}}><Badge color={T.blue}>{c?.name||"?"}</Badge><span style={{color:T.faint}}>→</span><Badge color={T.accent}>{w?.name||"?"}</Badge><span style={{color:T.sub,fontSize:11,marginLeft:"auto"}}>{ch.messages?.length||0} msgs</span></div><div style={{color:T.sub,fontSize:12,fontStyle:"italic"}}>"{last?.text||"No messages"}"</div></Card>);})}{!chats.length&&<div style={{textAlign:"center",color:T.sub,padding:"30px 0"}}>No chats yet</div>}</div>)}</div></div>);}
const Shell=({children,role})=>(<div style={{background:T.bg,minHeight:"100vh",color:T.text}}><div style={{background:T.surface,borderBottom:`1px solid ${T.border}`,padding:"12px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:10}}><Logo size={17}/><Badge color={role==="worker"?T.accent:T.blue}>{role==="worker"?"👷 Worker":"🧑 Customer"}</Badge></div><div style={{maxWidth:460,margin:"0 auto",padding:"16px 20px 60px"}}>{children}</div></div>);
function App(){const [scr,setScr]=useState("landing");const [myWorker,setMyWorker]=useState(null);const [myCustomer,setMyCustomer]=useState(null);const [activeChatId,setActiveChatId]=useState(null);const startChat=(wid,cid)=>{const ex=db.getDocs("chats").find(c=>c.workerId===wid&&c.customerId===cid);if(ex)return ex.id;return db.addDoc("chats",{workerId:wid,customerId:cid,messages:[]}).id;};if(scr==="landing")return<Landing onRole={setScr}/>;if(scr==="admin-login")return<AdminLogin onSuccess={()=>setScr("admin")} onBack={()=>setScr("landing")}/>;if(scr==="admin")return<AdminDashboard onLogout={()=>setScr("landing")}/>;if(scr==="worker-chat"&&myWorker&&activeChatId){const ch=db.getDocs("chats").find(c=>c.id===activeChatId);const cust=db.getDocs("customers").find(c=>c.id===ch?.customerId);return<ChatScreen chatId={activeChatId} currentRole="worker" otherName={cust?.name||"Customer"} otherSub={`📍 ${cust?.city||""} · 📱 ${cust?.phone||""}`} onBack={()=>setScr("worker-inbox")}/>;}if(scr==="customer-chat"&&myCustomer&&activeChatId){const ch=db.getDocs("chats").find(c=>c.id===activeChatId);const wk=db.getDocs("workers").find(w=>w.id===ch?.workerId);return<ChatScreen chatId={activeChatId} currentRole="customer" otherName={wk?.name||"Worker"} otherSub={`${wk?.skill||""} · 📍 ${wk?.city||""}`} onBack={()=>setScr("customer-search")}/>;}if(scr==="worker")return<Shell role="worker"><WorkerAuth onBack={()=>setScr("landing")} onDone={w=>{setMyWorker(w);setScr("worker-inbox");}}/></Shell>;if(scr==="worker-inbox"&&myWorker)return<Shell role="worker"><WorkerInbox worker={myWorker} onOpenChat={ch=>{setActiveChatId(ch.id);setScr("worker-chat");}} onToggle={()=>{const u={...myWorker,available:!myWorker.available};db.updateDoc("workers",myWorker.id,{available:u.available});setMyWorker(u);}} onBack={()=>{setMyWorker(null);setScr("landing");}}/></Shell>;if(scr==="customer")return<Shell role="customer"><CustomerAuth onBack={()=>setScr("landing")} onDone={c=>{setMyCustomer(c);setScr("customer-search");}}/></Shell>;if(scr==="customer-search"&&myCustomer){const cc=db.getWhere("chats","customerId",myCustomer.id).length;return<Shell role="customer"><CustomerSearch customer={myCustomer} chatCount={cc} onPickWorker={w=>{const id=startChat(w.id,myCustomer.id);setActiveChatId(id);setScr("customer-chat");}} onGoInbox={()=>setScr("customer-inbox")} onBack={()=>{setMyCustomer(null);setScr("landing");}}/></Shell>;}if(scr==="customer-inbox"&&myCustomer)return<Shell role="customer"><CustomerInbox customer={myCustomer} onOpenChat={ch=>{setActiveChatId(ch.id);setScr("customer-chat");}} onBack={()=>setScr("customer-search")}/></Shell>;return<Landing onRole={setScr}/>;}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script></body></html>
